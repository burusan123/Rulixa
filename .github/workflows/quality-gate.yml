name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      include_optional_smoke:
        description: Run optional smoke observations
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  required-gate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run required quality gate
        shell: pwsh
        run: .\scripts\Invoke-LocalQualityGate.ps1

      - name: Publish summary
        shell: pwsh
        run: Get-Content .\artifacts\local-quality\latest\summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-required
          path: |
            artifacts/local-quality/latest
            artifacts/local-quality/latest.txt

  optional-smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.include_optional_smoke == true
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run optional smoke observations
        shell: pwsh
        run: .\scripts\Invoke-LocalQualityGate.ps1 -IncludeOptionalSmoke

      - name: Publish summary
        shell: pwsh
        run: Get-Content .\artifacts\local-quality\latest\summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-optional-smoke
          path: |
            artifacts/local-quality/latest
            artifacts/local-quality/latest.txt
